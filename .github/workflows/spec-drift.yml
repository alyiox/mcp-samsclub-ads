name: Spec drift

# Regenerate the candidate OpenAPI spec from the developer.samsclub.com docs on a
# schedule. If the docs drifted, open a PR with the candidate diff. The PR is the
# human review gate: a reviewer ports real changes into the hand-authored canonical
# spec (src/mcp_samsclub_ads/specs/sponsored/sponsored-ads.openapi.json). The
# candidate is never shipped and never loaded at runtime.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  build-candidate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Regenerate candidate spec from docs
        run: uv run --group spec-build python scripts/build_spec.py

      - name: Open PR on drift
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: spec-candidate/sponsored-ads.candidate.openapi.json
          branch: spec-drift/candidate
          delete-branch: true
          labels: spec-drift
          title: "chore(spec): docs drift in Sam's Club Ads candidate spec"
          commit-message: |
            chore(spec): regenerate candidate spec from docs

            Auto-generated by scripts/build_spec.py from developer.samsclub.com.
            Review the diff and port real changes into the hand-authored
            src/mcp_samsclub_ads/specs/sponsored/sponsored-ads.openapi.json.

            Assisted-by: Claude:claude-opus-4-8
          body: |
            The scheduled scraper detected changes in the developer.samsclub.com docs.

            **This candidate is not shipped and not loaded at runtime** — it exists
            only to surface documentation drift (added/removed/renamed endpoints,
            parameters, and body fields).

            ### Review checklist
            - [ ] Inspect the diff to `spec-candidate/sponsored-ads.candidate.openapi.json`.
            - [ ] Port any real changes into the hand-authored
                  `src/mcp_samsclub_ads/specs/sponsored/sponsored-ads.openapi.json`
                  (keep its curated `$ref`s, enums, and formats).
            - [ ] Update the path/operation counts in `tests/test_specs.py` if the
                  canonical spec changed.
